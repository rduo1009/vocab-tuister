name: build
on:
  push:
    branches:
      - build/fix-nuitka-build
      - main
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    name: build project
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          [
            ubuntu-22.04,
            ubuntu-22.04-arm,
            macos-14,
            macos-15-intel,
            windows-2022,
          ]
      fail-fast: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: "recursive"
          persist-credentials: false

      # Note: setup-python is skipped on Linux because the hostedtoolcache Python
      # is built without ZSTD_MULTITHREAD support, which breaks Nuitka's onefile
      # compression. The system Python (from apt) has it enabled. On macOS and
      # Windows, setup-python works fine.
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        if: runner.os != 'Linux'
        with:
          python-version-file: ".python-version"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: false
        env:
          GOEXPERIMENT: jsonv2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
          cache-dependency-glob: "uv.lock"

      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: latest
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: ${{ matrix.os }}

      # Windows builds do not use poethepoet atm
      - name: Install deps
        if: ${{ !startsWith(matrix.os, 'windows') }}
        run: |
          uv tool install poethepoet

      - name: Ensure uv is on PATH
        if: ${{ startsWith(matrix.os, 'windows') }}
        shell: pwsh
        run: |
          echo "C:\Users\runneradmin\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Ensure Git is on PATH
        if: ${{ startsWith(matrix.os, 'windows') }}
        shell: pwsh
        run: |
          echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # HACK: Have to workaround using poe as there are weird errors for some reason
      - name: Build project
        if: ${{ startsWith(matrix.os, 'windows') }}
        shell: pwsh
        run: |
          scripts/build.ps1
        env:
          GOEXPERIMENT: jsonv2
          NUITKA_CACHE_DIR_CCACHE: ${{ github.workspace }}/.ccache

      - name: Build project
        if: ${{ !startsWith(matrix.os, 'windows') }}
        run: |
          poe build
        env:
          GOEXPERIMENT: jsonv2
          NUITKA_CACHE_DIR_CCACHE: ${{ github.workspace }}/.ccache

      # Bundle each non-server binary together with its matching server binary into a
      # single zip. For example, vocab-tuister-darwin-arm64 and
      # vocab-tuister-server-darwin-arm64 both end up in vocab-tuister-darwin-arm64.zip.
      - name: Zip binaries (Unix)
        if: ${{ !startsWith(matrix.os, 'windows') }}
        shell: bash
        run: |
          cd dist

          # Iterate only over files whose names begin with "vocab-tuister-" so that
          # any unexpected files in dist/ (e.g. logs or intermediate artefacts) are
          # never accidentally processed.
          for f in vocab-tuister-*; do
            # Guard: make sure this glob entry is a regular file, not a directory or
            # an unexpanded glob (which bash leaves as the literal pattern string).
            [[ -f "$f" ]] || continue

            # Already-zipped files are left alone — nothing to do.
            [[ "$f" == *.zip ]] && continue

            # Server binaries are skipped here; each one is picked up automatically
            # when its non-server counterpart is processed below.
            [[ "$f" == *-server-* ]] && continue

            # Derive the server binary's filename by inserting "-server" after the
            # product name. e.g. vocab-tuister-darwin-arm64
            #                 -> vocab-tuister-server-darwin-arm64
            server="${f/vocab-tuister/vocab-tuister-server}"

            # Guard: the server binary must exist. If it is absent the substitution
            # above produced the wrong name (e.g. the naming convention changed), so
            # we fail loudly here rather than letting zip fail with a cryptic error.
            if [[ ! -f "$server" ]]; then
              echo "Error: expected server binary '$server' not found for client '$f'" >&2
              exit 1
            fi

            # Bundle both binaries into a single zip named after the non-server binary.
            # The -j flag ("junk paths") stores the files flat, with no directory
            # structure inside the zip.
            echo "Zipping $f + $server -> ${f}.zip"
            zip -j "${f}.zip" "$f" "$server"
          done

      # Same bundling logic as the Unix step above, implemented in PowerShell.
      - name: Zip binaries (Windows)
        if: ${{ startsWith(matrix.os, 'windows') }}
        shell: pwsh
        run: |
          Set-Location dist

          # Filter down to only the non-server, non-zip files before looping, so we
          # never need to skip inside the loop. Server binaries are excluded here for
          # the same reason as in the Unix step — they are included implicitly below.
          Get-ChildItem -File |
            Where-Object { $_.Name -notlike "*.zip" -and $_.Name -notlike "*-server-*" } |
            ForEach-Object {

            # Derive the server binary's filename using the same "-server" insertion
            # logic as the Unix step.
            # e.g. vocab-tuister-windows-arm64.exe -> vocab-tuister-server-windows-arm64.exe
            $serverName = $_.Name -replace "vocab-tuister", "vocab-tuister-server"
            $serverPath = Join-Path $_.DirectoryName $serverName

            # Strip the .exe extension from the zip name so the result matches the
            # Unix convention. e.g. vocab-tuister-windows-arm64.exe -> vocab-tuister-windows-arm64.zip
            $zipName = $_.Name -replace "\.exe$", ""

            # Bundle both binaries into a single zip, overwriting any previous zip
            # (-Force) with the same name.
            Write-Host "Zipping $($_.Name) + $serverName -> $zipName.zip"
            Compress-Archive -Path $_.FullName, $serverPath -DestinationPath "$zipName.zip" -Force
          }

      - name: Upload binaries
        if: github.ref_type == 'branch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vocab-tuister-${{ matrix.os }}
          path: dist/*.zip
          if-no-files-found: error

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --generate-notes \
            --verify-tag \
            dist/*.zip
