name: check
on: push

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test-unit-python:
    name: unit test with python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: "recursive"
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache tox
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .tox
          key: tox-${{ hashFiles('.python-version') }}-${{ hashFiles('pyproject.toml','uv.lock') }}
          restore-keys: |
            tox-${{ hashFiles('.python-version') }}-

      - name: Install tox
        run: |
          uv tool install tox \
            --python-preference only-managed --python 3.14 \
            --with tox-uv --with tox-gh

      - name: Install deps
        run: tox --notest

      - name: Run test suite
        run: tox --skip-pkg-install

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-unit-python
          path: .coverage.python-unit
          include-hidden-files: true
          if-no-files-found: error

  test-integration-python:
    name: integration test with python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: "recursive"
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install deps
        run: uv sync

      - name: Run integration tests
        run: |
          uv run coverage run \
            --data-file=.coverage.python-integration --source=src \
            -m pytest -m 'integration' -n0
        env:
          PYTHONHASHSEED: 1

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-integration-python
          path: .coverage.python-integration
          include-hidden-files: true
          if-no-files-found: error

  test-unit-go:
    name: unit test with go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: "recursive"
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: Install deps
        run: go mod download
        env:
          GOEXPERIMENT: jsonv2

      - name: Run test suite
        run: go test -coverpkg=./src/... -coverprofile=go-unit.out ./src/...
        env:
          GOEXPERIMENT: jsonv2

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-unit-go
          path: go-unit.out
          if-no-files-found: error

  coverage:
    name: combine and upload coverage
    needs: [test-unit-python, test-integration-python, test-unit-go]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: "recursive"
          persist-credentials: false

      - name: Download coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: .
          pattern: coverage-*
          merge-multiple: true

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
        env:
          GOEXPERIMENT: jsonv2

      - name: Combine Python coverage and generate xml report
        run: |
          uv run coverage combine
          uv run coverage xml -o python-combined.xml

      - name: Combine Go coverage
        run: |
          # TODO: e2e tests to be added later
          go tool gocovmerge go-unit.out > go-combined.out

      - name: Upload results to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: python-combined.xml,go-combined.out
          token: ${{ secrets.CODECOV_TOKEN }}
