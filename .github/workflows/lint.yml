name: lint
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  lint-golang:
    name: lint with golangci-lint
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2
    permissions:
      contents: write

    steps:
      - name: Checkout PR HEAD (code to be fixed)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Check out the contributor's branch, not the base branch.
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: true

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          # Read the required Go version from go.mod so the workflow stays
          # in sync with the project automatically.
          go-version-file: "go.mod"
          cache: true

      - name: Run golangci-lint --fix (Linux)
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          args: >-
            --fix
            --fast-only
            --enable=modernize,whitespace,wsl_v5

      - name: Run golangci-lint --fix (macOS)
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          args: >-
            --fix
            --fast-only
            --enable=modernize,whitespace,wsl_v5
        env:
          GOOS: "darwin"

      - name: Run golangci-lint --fix (Windows)
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          args: >-
            --fix
            --fast-only
            --enable=modernize,whitespace,wsl_v5
        env:
          GOOS: "windows"

      - name: Commit and push lint fixes back to PR branch (same-repo PRs only)
        # Skip this step for fork PRs – we have no write access to the fork.
        if: github.event.pull_request.head.repo.full_name == github.repository
        # Pass the branch ref via an environment variable rather than
        # interpolating it directly into the shell script, to prevent
        # code-injection if the branch name contains shell metacharacters.
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No changes produced by golangci-lint --fix."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "🧹 chore(lint): golangci-lint --fix"
          git push origin "HEAD:${HEAD_REF}"

  lint-pinact:
    name: pin actions versions in workflows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Pin actions
        uses: suzuki-shunsuke/pinact-action@896d595f299e71d65b9d28349d6956abe144390a # v3.0.0
        with:
          app_id: ${{vars.APP_ID}}
          app_private_key: ${{secrets.APP_PRIVATE_KEY}}
