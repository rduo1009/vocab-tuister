exclude: "src/_vendor/.*"

ci:
  skip: [uv-lock, golangci-lint]
  autofix_commit_msg: "🔨 refactor: [pre-commit.ci] auto fixes from pre-commit.com hooks"
  autoupdate_commit_msg: "🤖 ci(pre-commit): pre-commit autoupdate"

repos:
  # Check project deps
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.10
    hooks:
      - id: uv-lock

  # Format and check code
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff
        args: [--select, I, --fix]
      - id: ruff-format

  # Temporary probe: print the Go version available in pre-commit.ci environment
  - repo: local
    hooks:
      - id: go-version-probe
        name: "Probe: print go version"
        language: system
        entry: bash -c 'GOTOOLCHAIN=local go version'
        pass_filenames: false
        always_run: true

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.11.3
    hooks:
      - id: golangci-lint
        language_version: "1.26.1"
        args:
          - --fix
          - --fast-only
          - --enable=modernize,whitespace,wsl_v5

  # Format and check other files
  - repo: https://github.com/dzhu/rstfmt
    rev: v0.0.14
    hooks:
      - id: rstfmt
        args: [-w, "79"]

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.19.0"
    hooks:
      - id: pyproject-fmt
        args: [--keep-full-version]

  - repo: https://github.com/tox-dev/tox-toml-fmt
    rev: "v1.9.1"
    hooks:
      - id: tox-toml-fmt

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-vcs-permalinks
      - id: detect-private-key

  - repo: https://github.com/executablebooks/mdformat
    rev: "1.0.0"
    hooks:
      - id: mdformat
        types: [markdown]
