syntax = "proto3";

package vocab_tuister.v1;

option go_package = "github.com/rduo1009/vocab-tuister/src/client/internal/pb;pb";

enum Case {
  CASE_UNSPECIFIED = 0;
  CASE_NOMINATIVE = 1;
  CASE_VOCATIVE = 2;
  CASE_ACCUSATIVE = 3;
  CASE_GENITIVE = 4;
  CASE_DATIVE = 5;
  CASE_ABLATIVE = 6;
}

enum Number {
  NUMBER_UNSPECIFIED = 0;
  NUMBER_SINGULAR = 1;
  NUMBER_PLURAL = 2;
}

enum Gender {
  GENDER_UNSPECIFIED = 0;
  GENDER_MASCULINE = 1;
  GENDER_FEMININE = 2;
  GENDER_NEUTER = 3;
}

enum Tense {
  TENSE_UNSPECIFIED = 0;
  TENSE_PRESENT = 1;
  TENSE_IMPERFECT = 2;
  TENSE_FUTURE = 3;
  TENSE_PERFECT = 4;
  TENSE_PLUPERFECT = 5;
  TENSE_FUTURE_PERFECT = 6;
}

enum Voice {
  VOICE_UNSPECIFIED = 0;
  VOICE_ACTIVE = 1;
  VOICE_PASSIVE = 2;
  VOICE_DEPONENT = 3;
  VOICE_SEMI_DEPONENT = 4;
}

enum Mood {
  MOOD_UNSPECIFIED = 0;
  MOOD_INDICATIVE = 1;
  MOOD_SUBJUNCTIVE = 2;
  MOOD_IMPERATIVE = 3;
  MOOD_INFINITIVE = 4;
  MOOD_PARTICIPLE = 5;
  MOOD_GERUND = 6;
  MOOD_SUPINE = 7;
}

enum Person {
  PERSON_UNSPECIFIED = 0;
  PERSON_FIRST = 1;
  PERSON_SECOND = 2;
  PERSON_THIRD = 3;
}

enum Degree {
  DEGREE_UNSPECIFIED = 0;
  DEGREE_POSITIVE = 1;
  DEGREE_COMPARATIVE = 2;
  DEGREE_SUPERLATIVE = 3;
}

message EndingComponents {
  Case case = 1;
  Number number = 2;
  Gender gender = 3;
  Tense tense = 4;
  Voice voice = 5;
  Mood mood = 6;
  Person person = 7;
  Degree degree = 8;
  string string = 9;
}
