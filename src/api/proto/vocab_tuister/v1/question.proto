syntax = "proto3";

package vocab_tuister.v1;

message MultipleChoiceLatToEngQuestion {
  string prompt = 1;
  string answer = 2;
  repeated string choices = 3;
}

message TypeInQuestion {
  string prompt = 1;
  string answer = 2;
}

message Question {
  oneof kind {
    MultipleChoiceLatToEngQuestion mc_lat_to_eng = 1;
    TypeInQuestion type_in = 2;
  }
}
