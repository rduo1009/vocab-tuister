syntax = "proto3";

package vocab_tuister.v1;

import "vocab_tuister/v1/question.proto";
import "vocab_tuister/v1/session.proto";
import "vocab_tuister/v1/vocab.proto";

// TODO:
// option go_package = "github.com/yourrepo/project/gen/proto/vocabservice;vocabservice";

service VocabService {
  rpc VerifyVocab(VerifyVocabRequest) returns (VerifyVocabResponse);

  rpc VerifyConfig(VerifyConfigRequest) returns (VerifyConfigResponse);

  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
}

message VerifyVocabRequest {
  string vocab_text = 1;
}
message VerifyVocabResponse {
  bool ok = 1;
  string error_message = 2;
}

message VerifyConfigRequest {
  int32 number_of_questions = 1;
  SessionConfig config = 2;
}

message VerifyConfigResponse {
  bool ok = 1;
  string error_message = 2;
}

message CreateSessionRequest {
  VocabList vocab = 1;
  int32 number_of_questions = 2;
  SessionConfig config = 3;
}

message CreateSessionResponse {
  repeated Question questions = 1;
}
